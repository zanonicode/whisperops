name: Agent Eval

on:
  pull_request:
    paths:
      - "agents/**"
      - "backstage-templates/**"

jobs:
  validate-agent-manifests:
    name: Validate Agent Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.31.0"

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: whisperops-eval
          kubectl_version: v1.31.0

      - name: Install CRDs (kagent mock)
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: agents.kagent.dev
          spec:
            group: kagent.dev
            versions:
              - name: v1
                served: true
                storage: true
                schema:
                  openAPIV3Schema:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            scope: Namespaced
            names:
              plural: agents
              singular: agent
              kind: Agent
          EOF

      - name: Apply changed agent manifests (dry-run)
        run: |
          CHANGED_DIRS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'agents/**' | \
            grep -oP 'agents/[^/]+' | sort -u || echo "")
          if [[ -z "$CHANGED_DIRS" ]]; then
            echo "No agent directories changed"
            exit 0
          fi
          for dir in $CHANGED_DIRS; do
            if [[ -d "$dir" ]]; then
              echo "Validating $dir..."
              kubectl apply --dry-run=client -f "$dir/" --recursive
            fi
          done

      - name: Run fixture evals against dry-run manifests
        run: python3 tests/eval/agent-template-validation/run-evals.py
        env:
          PYTHONPATH: .
