name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: Lint sandbox
        run: ruff check src/sandbox/

      - name: Lint platform-bootstrap
        run: ruff check src/platform-bootstrap/

      - name: Lint budget-controller
        run: ruff check src/budget-controller/

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/chat-frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/chat-frontend
        run: npm ci

      - name: Type check
        working-directory: src/chat-frontend
        run: npm run type-check

  lint-helm:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.4"

      - name: Lint all platform charts
        run: |
          for chart in platform/helm/*/; do
            echo "→ Linting $chart"
            helm lint "$chart"
          done

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform
        run: terraform validate

      - name: Format check
        working-directory: terraform
        run: terraform fmt -check -recursive

  check-sops-files:
    name: SOPS Encrypted Files Present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required encrypted secrets exist
        run: |
          REQUIRED=(
            secrets/anthropic.enc.yaml
            secrets/openai.enc.yaml
            secrets/supabase.enc.yaml
            secrets/langfuse.enc.yaml
            secrets/crossplane-gcp-creds.enc.yaml
          )
          FAIL=0
          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING: $f"
              FAIL=1
            elif ! grep -q 'sops:' "$f"; then
              echo "NOT ENCRYPTED: $f (missing 'sops:' key)"
              FAIL=1
            else
              echo "OK: $f"
            fi
          done
          exit $FAIL

  run-evals:
    name: Run Fixture Evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run eval validation
        run: python3 tests/eval/agent-template-validation/run-evals.py
