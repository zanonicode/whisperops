          context: src/platform-bootstrap
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/platform-bootstrap:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/platform-bootstrap:latest

  build-budget-controller:
    name: Build Budget Controller Image
    runs-on: ubuntu-latest
