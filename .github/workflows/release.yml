name: Release

on:
  push:
    branches: [main]

# REGISTRY_URL is set from Terraform output `registry_url`.
# Format: {region}-docker.pkg.dev/{project_id}/whisperops-images
# Set REGISTRY_URL and GCP_PROJECT_ID as GitHub Actions variables in the repo settings.
# For auth, configure Workload Identity Federation:
#   - GitHub OIDC provider: https://token.actions.githubusercontent.com
#   - Attribute mapping: google.sub → assertion.repository
#   - Service account: whisperops-bootstrap@{project}.iam.gserviceaccount.com
#   - Grant roles/artifactregistry.writer to the WIF principal.
# Alternatively, store a bootstrap SA JSON key as GOOGLE_CREDENTIALS secret.

env:
  REGISTRY_URL: ${{ vars.REGISTRY_URL }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      sandbox: ${{ steps.filter.outputs.sandbox }}
      chat-frontend: ${{ steps.filter.outputs.chat-frontend }}
      platform-bootstrap: ${{ steps.filter.outputs.platform-bootstrap }}
      budget-controller: ${{ steps.filter.outputs.budget-controller }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sandbox:
              - 'src/sandbox/**'
              - '.github/workflows/release.yml'
            chat-frontend:
              - 'src/chat-frontend/**'
              - '.github/workflows/release.yml'
            platform-bootstrap:
              - 'src/platform-bootstrap/**'
              - '.github/workflows/release.yml'
            budget-controller:
              - 'src/budget-controller/**'
              - '.github/workflows/release.yml'

  build-sandbox:
    name: Build Sandbox Image
    needs: detect-changes
    if: needs.detect-changes.outputs.sandbox == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $(echo "$REGISTRY_URL" | cut -d/ -f1) --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push sandbox
        uses: docker/build-push-action@v6
        with:
          context: src/sandbox
          push: true
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox
          tags: |
            ${{ env.REGISTRY_URL }}/sandbox:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/sandbox:latest

  build-chat-frontend:
    name: Build Chat Frontend Image
    needs: detect-changes
    if: needs.detect-changes.outputs.chat-frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $(echo "$REGISTRY_URL" | cut -d/ -f1) --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push chat-frontend
        uses: docker/build-push-action@v6
        with:
          context: src/chat-frontend
          push: true
          cache-from: type=gha,scope=chat-frontend
          cache-to: type=gha,mode=max,scope=chat-frontend
          tags: |
            ${{ env.REGISTRY_URL }}/chat-frontend:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/chat-frontend:latest

  build-platform-bootstrap:
    name: Build Platform Bootstrap Image
    needs: detect-changes
    if: needs.detect-changes.outputs.platform-bootstrap == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $(echo "$REGISTRY_URL" | cut -d/ -f1) --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push platform-bootstrap
        uses: docker/build-push-action@v6
        with:
          context: src/platform-bootstrap
          push: true
          cache-from: type=gha,scope=platform-bootstrap
          cache-to: type=gha,mode=max,scope=platform-bootstrap
          tags: |
            ${{ env.REGISTRY_URL }}/platform-bootstrap:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/platform-bootstrap:latest

  build-budget-controller:
    name: Build Budget Controller Image
    needs: detect-changes
    if: needs.detect-changes.outputs.budget-controller == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $(echo "$REGISTRY_URL" | cut -d/ -f1) --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push budget-controller
        uses: docker/build-push-action@v6
        with:
          context: src/budget-controller
          push: true
          cache-from: type=gha,scope=budget-controller
          cache-to: type=gha,mode=max,scope=budget-controller
          tags: |
            ${{ env.REGISTRY_URL }}/budget-controller:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/budget-controller:latest
