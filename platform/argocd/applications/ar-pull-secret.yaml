apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ar-pull-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: http://my-gitea-http.gitea.svc.cluster.local:3000/whisperops/whisperops.git
    targetRevision: HEAD
    path: platform/crossplane/ar-pull-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # DD-102: ar-pull-secret-seed Job patches the source Secret's
  # .data['.dockerconfigjson'] with a real Artifact Registry access token at
  # PostSync. Without ignoreDifferences here, ArgoCD's selfHeal sees the
  # populated data as drift from the Git declaration (which is e30K == "{}")
  # and reverts the Secret to empty within seconds — leaving Reflector to
  # replicate emptiness to consumer namespaces. The result is endless
  # ImagePullBackOff for budget-controller / platform-bootstrap / sandbox.
  # Tell ArgoCD to ignore the data field so the seed Job's patch sticks.
  # Past incident: 2026-05-08 v1.33+DD-99/101 deploy. Verified by checking
  # secret managedFields[].manager — "argocd-controller" was the last writer
  # of an empty value, immediately after the seed Job logged
  # "ar-pull-secret seeded successfully".
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: ar-pull-secret
      namespace: crossplane-system
      jsonPointers:
        - /data/.dockerconfigjson
