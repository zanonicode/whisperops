apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ar-pull-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: http://my-gitea-http.gitea.svc.cluster.local:3000/whisperops/whisperops.git
    targetRevision: HEAD
    path: platform/crossplane/ar-pull-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # The ar-pull-secret-seed Job patches this Secret's
  # .data['.dockerconfigjson'] with a real Artifact Registry access token at
  # PostSync. Without ignoreDifferences, ArgoCD's selfHeal sees the populated
  # data as drift from the Git declaration (which is "{}") and reverts the
  # Secret to empty within seconds — Reflector then replicates emptiness to
  # consumer namespaces, causing ImagePullBackOff on budget-controller,
  # platform-bootstrap, and sandbox. Ignore the data field so the seed Job's
  # patch sticks.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: ar-pull-secret
      namespace: crossplane-system
      jsonPointers:
        - /data/.dockerconfigjson
