image:
  # DD-14: GCP Artifact Registry. DD-66: fixed from stale gitea.local path.
  # REPLACE_PROJECT_ID is substituted at helm template time via --set in _vm-bootstrap.
  repository: us-central1-docker.pkg.dev/REPLACE_PROJECT_ID/whisperops-images/platform-bootstrap
  pullPolicy: IfNotPresent
  tag: "latest"

# DD-26 (DESIGN v1.7): operator-supplied platform values. Surfaced via the
# `platform-config` ConfigMap so Backstage scaffolder can read them at
# agent-creation time without prompting on every form.
platformConfig:
  baseDomain: ""    # e.g. "136.115.224.138.sslip.io" — REQUIRED
  registryUrl: ""   # e.g. "us-central1-docker.pkg.dev/whisperops/whisperops-images"
  projectId: ""     # e.g. "whisperops"

datasetsBucket: ""

secrets:
  supabase:
    secretName: supabase-credentials
    urlKey: url
    serviceRoleKeyKey: service-role-key
  anthropic:
    secretName: anthropic-credentials
    apiKeyKey: api-key
  openai:
    secretName: openai-credentials
    apiKeyKey: api-key

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

serviceAccount:
  create: true
  name: platform-bootstrap

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
