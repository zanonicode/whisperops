# platform-config ConfigMap holds operator-supplied values that the Backstage
# scaffolder reads at agent-creation time. The `base_domain` key is the most
# important — it pins the sslip.io host pattern used by per-agent Ingresses
# to the current VM external IP. The operator sets this once at platform
# install (passed via Helm values) and Backstage reads it on every form
# submission.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: {{ .Release.Namespace | default "whisperops-system" }}
  labels:
    app.kubernetes.io/name: platform-config
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  # Format: <vm-external-ip>.sslip.io (sslip.io resolves any *.X.Y.Z.W.sslip.io
  # to that IPv4). Drives `agent-<name>.<base_domain>:8443` per-agent URLs.
  base_domain: {{ .Values.platformConfig.baseDomain | quote }}
  # GCP Artifact Registry URL for sandbox + chat-frontend images.
  registry_url: {{ .Values.platformConfig.registryUrl | quote }}
  # GCP project ID for Crossplane provider config + dataset bucket.
  project_id: {{ .Values.platformConfig.projectId | quote }}
