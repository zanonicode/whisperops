# observability-extras chart values.
# PrometheusOperator gate removed (ADR-Obs-16 — dead code; Mimir ruler ConfigMaps replace it).
# mimirRulerRules enabled: the 4 ConfigMaps in platform/observability/mimir-ruler-rules/
# are applied by the ArgoCD observability app, not this chart.
mimirRulerRules:
  enabled: true

grafana:
  dashboardsConfigMap: whisperops-dashboards
  datasources:
    tempo:
      url: http://tempo-mono.observability.svc:3100
    loki:
      url: http://lgtm-distributed-loki-gateway.observability.svc:80
    mimir:
      url: http://lgtm-distributed-mimir-nginx.observability.svc:80/prometheus
    stackdriver:
      uid: stackdriver
