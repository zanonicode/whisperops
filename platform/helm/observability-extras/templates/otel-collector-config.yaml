apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: {{ .Values.otelCollector.config.processors.memory_limiter.limit_mib }}
    exporters:
      otlp/tempo:
        endpoint: {{ .Values.grafana.datasources.tempo.url | replace "http://" "" }}:4317
        tls:
          insecure: true
      otlphttp/langfuse:
        endpoint: ${LANGFUSE_OTLP_ENDPOINT}
        headers:
          Authorization: "Basic ${LANGFUSE_BASIC_AUTH}"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo, otlphttp/langfuse]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]
