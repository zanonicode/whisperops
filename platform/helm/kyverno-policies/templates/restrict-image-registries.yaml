{{- $arPrefix := printf "%s-docker.pkg.dev/%s/%s" .Values.imageRegistry.region .Values.imageRegistry.projectId .Values.imageRegistry.repositoryName }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Only images from the platform Artifact Registry and approved
      upstream registries are allowed. Gitea container registry is not in
      the allowlist. This prevents supply-chain attacks via untrusted image
      sources.
    pod-policies.kyverno.io/autogen-controllers: none
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: restrict-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        any:
          - key: "{{`{{starts_with(request.object.metadata.namespace, 'agent-')}}`}}"
            operator: Equals
            value: "true"
      validate:
        message: >-
          Images must come from the platform Artifact Registry
          ({{ $arPrefix }}/*) or approved upstream registries
          (gcr.io/distroless/, ghcr.io/argoproj/, registry.k8s.io/,
          docker.io/library/python, quay.io/jetstack/).
        pattern:
          spec:
            containers:
              - image: "{{ $arPrefix }}/* | gcr.io/distroless/* | ghcr.io/argoproj/* | registry.k8s.io/* | docker.io/library/* | quay.io/jetstack/*"
