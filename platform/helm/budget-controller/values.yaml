replicaCount: 1

image:
  # DD-14: GCP Artifact Registry. DD-28: budget-controller activated in v0.3.
  repository: us-central1-docker.pkg.dev/whisperops/whisperops-images/budget-controller
  pullPolicy: IfNotPresent
  tag: "0.1.0"

pollInterval: 60

langfuse:
  secretName: langfuse-credentials
  publicKeyEnvVar: LANGFUSE_PUBLIC_KEY
  secretKeyEnvVar: LANGFUSE_SECRET_KEY
  publicKeySecretKey: LANGFUSE_PUBLIC_KEY
  secretKeySecretKey: LANGFUSE_SECRET_KEY
  hostEnvVar: LANGFUSE_HOST
  host: "https://us.cloud.langfuse.com"

# Reference the per-namespace AR pull Secret (DD-18).
imagePullSecrets:
  - name: ar-pull-secret

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

serviceAccount:
  create: true
  name: budget-controller

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
tolerations: []
affinity: {}
