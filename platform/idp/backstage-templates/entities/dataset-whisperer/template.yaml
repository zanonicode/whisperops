apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: dataset-whisperer
  title: Dataset Whisperer Agent
  description: >
    Provision a fully governed Dataset Whisperer agent — Planner + Analyst + Writer —
    with a dedicated GCS bucket, IAM bindings, sandbox access, and chat UI.
    K8s manifests are scaffolded into a manifests/ subfolder so ArgoCD syncs only
    Kubernetes resources; catalog-info.yaml stays at the repo root for Backstage
    catalog discovery.
  tags:
    - whisperops
    - ai-agent
    - data-analysis
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Agent Identity
      required:
        - agent_name
        - description
      properties:
        agent_name:
          title: Agent Name
          type: string
          description: >
            Short slug identifier for this agent (e.g., "housing-analyst").
            Used in namespace, bucket, and ingress hostname.
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: What does this agent analyse? Used in Backstage catalog.
          maxLength: 200
        base_domain:
          title: Base domain
          type: string
          description: >
            Hostname suffix for the agent's chat URL. Auto-populated by
            _vm-bootstrap sed-bake from the current VM IP. Do not modify.
          default: "__BASE_DOMAIN__"
          pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\.sslip\.io$|^[a-z0-9.-]+\.[a-z]{2,}$'
          ui:widget: hidden
        project_id:
          title: GCP project ID
          type: string
          description: >
            Target GCP project for Crossplane-managed resources. Auto-populated
            by _vm-bootstrap sed-bake. Do not modify.
          default: "__PROJECT_ID__"
          pattern: '^[a-z][a-z0-9-]{4,28}[a-z0-9]$'
          ui:widget: hidden

    - title: Dataset & Budget Configuration
      required:
        - dataset_id
      properties:
        dataset_id:
          title: Dataset
          type: string
          description: The dataset this agent will analyse.
          enum:
            - california-housing
            - online-retail-ii
            - spotify-tracks
          enumNames:
            - California Housing Prices (1.4 MB)
            - Online Retail II UCI (95 MB)
            - Spotify Tracks (20 MB)
        budget_usd:
          title: Budget (USD)
          type: string
          description: Maximum spend in USD before agent is shut down by budget-controller.
          default: "5.00"
          pattern: '^\d+\.\d{2}$'

  steps:
    - id: fetch-template
      name: Render agent manifests
      action: fetch:template
      input:
        url: ./skeleton
        templateFileExtension: .njk
        values:
          agent_name: ${{ parameters.agent_name }}
          description: ${{ parameters.description }}
          dataset_id: ${{ parameters.dataset_id }}
          budget_usd: ${{ parameters.budget_usd }}
          project_id: ${{ parameters.project_id | default('') }}
          region: US-CENTRAL1
          base_domain: ${{ parameters.base_domain }}

    - id: publish-gitea
      name: Commit manifests to Gitea
      action: publish:gitea
      input:
        description: "Whisperops agent: ${{ parameters.description }}"
        repoUrl: cnoe.localtest.me:8443/gitea?repo=agent-${{ parameters.agent_name }}
        defaultBranch: main

    - id: create-argocd-app
      name: Create ArgoCD Application
      action: cnoe:create-argocd-app
      input:
        appName: agent-${{ parameters.agent_name }}
        appNamespace: agent-${{ parameters.agent_name }}
        argoInstance: in-cluster
        projectName: default
        repoUrl: https://cnoe.localtest.me:8443/gitea/giteaAdmin/agent-${{ parameters.agent_name }}
        path: "manifests"

    # catalog:register intentionally omitted — Backstage's catalog ingester
    # auto-discovers the catalog-info.yaml from the Gitea repo via the
    # location registered on the first scaffolder run for this agent name.
    # Re-running the scaffolder for the same name would 409 on duplicate
    # location, so we skip the explicit registration and let the poller
    # handle ingestion.

  output:
    links:
      - title: Agent Repository
        url: ${{ steps['publish-gitea'].output.remoteUrl }}
      - title: Chat UI
        url: https://agent-${{ parameters.agent_name }}.${{ parameters.base_domain }}:8443/
