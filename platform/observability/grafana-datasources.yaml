# Grafana datasource provisioning ConfigMap.
#
# The Grafana Helm sidecar watches for ConfigMaps with label
# `grafana_datasource: "1"` cluster-wide and merges their content into
# /etc/grafana/provisioning/datasources/. No Grafana restart needed.
#
# Datasources wired here:
#   - Tempo  (traces)
#   - Loki   (logs — populated when we add the Loki pipeline)
#   - Mimir  (metrics — populated when we add Prometheus remote-write)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-whisperops
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        uid: tempo
        url: http://lgtm-distributed-tempo-query-frontend.observability.svc.cluster.local:3100
        isDefault: false
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
          tracesToLogs:
            datasourceUid: loki
            tags: ["agent.id", "agent.role", "k8s.namespace.name"]
            mappedTags:
              - key: service.name
                value: service
            spanStartTimeShift: -1m
            spanEndTimeShift: 1m
            filterByTraceID: true
      - name: Loki
        type: loki
        access: proxy
        uid: loki
        url: http://lgtm-distributed-loki-gateway.observability.svc.cluster.local
        isDefault: false
      - name: Prometheus
        type: prometheus
        access: proxy
        uid: prometheus
        url: http://lgtm-distributed-mimir-nginx.observability.svc.cluster.local/prometheus
        isDefault: true
