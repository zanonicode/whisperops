# OpenTelemetry Collector pipeline for whisperops.
#
# Receives OTLP from chat-frontend (Node), sandbox (FastAPI), and any
# future agent-side instrumentation. Pipes traces -> Tempo, logs -> Loki,
# metrics -> Mimir.
#
# Per-agent attribution is added by the resource processor based on the
# pod's namespace label `whisperops.io/agent`. Spans coming from any
# pod in an agent-* namespace get the `agent.id` resource attribute.
mode: deployment
image:
  repository: otel/opentelemetry-collector-contrib

# Resource limits — chart warned `useGOMEMLIMIT enabled but limits not set`.
# Setting limit-memory unblocks GOMEMLIMIT and prevents the collector from
# being OOM-killed under burst load.
resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Open the OTLP endpoint cluster-wide (default behavior, but explicit).
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
          cors:
            # Browser OTel sender (chat-frontend page) ships traces over CORS.
            allowed_origins:
              - "*"

  processors:
    batch:
      timeout: 5s
      send_batch_size: 512
    # Pull pod labels into resource attributes — k8s.pod.labels.* will
    # carry our `whisperops.io/agent` and `whisperops.io/role`.
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
        labels:
          - tag_name: agent.id
            key: whisperops.io/agent
            from: pod
          - tag_name: agent.role
            key: whisperops.io/role
            from: pod
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
        - sources:
            - from: connection
    resource:
      attributes:
        - action: upsert
          key: deployment.environment
          value: dev
    # Truncate every span attribute value to 2048 bytes. Sandbox spans carry
    # user Python source as an attribute, which trips the OTel collector
    # "too many attributes" warning and bloats Tempo/Langfuse storage.
    # Implemented via a `transform` processor with OTTL `truncate_all` because
    # `config.attribute_limits.max_attribute_value_size` is not a valid OTel
    # collector root key.
    transform/truncate_attrs:
      trace_statements:
        - context: span
          statements:
            - truncate_all(attributes, 2048)

  exporters:
    debug:
      verbosity: basic
    # We deploy a SECOND Tempo (monolithic, single-binary) alongside
    # lgtm-distributed because the distributed Tempo's distributor enforces
    # a "min 2 live ingester replicas" check that can't be turned off in
    # single-node mode (replication_factor: 1 doesn't help — it's a
    # separate ring health check). The monolithic chart works on single
    # node out of the box. Both Tempos write to local storage; only this
    # one is wired into the OTel pipeline. lgtm-distributed Tempo remains
    # for future multi-node use.
    otlp/tempo:
      endpoint: tempo-mono.observability.svc.cluster.local:4317
      tls:
        insecure: true

    # Dual-ship traces to Langfuse Cloud (US region) when the
    # langfuse-credentials Secret is mounted. Langfuse accepts OTLP/HTTP at
    # /api/public/otel with Basic auth (public:secret base64). The auth
    # header is built from env vars sourced from the Secret — see extraEnvs
    # below. If the Secret is absent the env vars are empty and the
    # exporter still loads but every export 401s and gets dropped (debug
    # exporter still captures locally so no data loss in Tempo).
    otlphttp/langfuse:
      endpoint: ${env:LANGFUSE_OTLP_ENDPOINT}
      headers:
        Authorization: "Basic ${env:LANGFUSE_BASIC_AUTH}"

  service:
    telemetry:
      logs:
        level: info
    pipelines:
      traces:
        receivers: [otlp]
        processors: [k8sattributes, resource, transform/truncate_attrs, batch]
        exporters: [otlp/tempo, otlphttp/langfuse, debug]
      # Logs and metrics pipelines deferred — first prove traces work end-to-end.

# Pull Langfuse credentials into the collector pod's env. Secret name and
# keys match what we materialize at deploy-time in the observability ns.
extraEnvs:
  - name: LANGFUSE_OTLP_ENDPOINT
    valueFrom:
      secretKeyRef:
        name: langfuse-credentials
        key: LANGFUSE_OTLP_ENDPOINT
        optional: true
  - name: LANGFUSE_BASIC_AUTH
    valueFrom:
      secretKeyRef:
        name: langfuse-credentials
        key: LANGFUSE_BASIC_AUTH
        optional: true

# k8sattributes processor needs RBAC to read pods cluster-wide.
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["replicasets", "deployments"]
      verbs: ["get", "list", "watch"]

serviceAccount:
  create: true

# Send the chart's default 'metrics' pipeline (which scrapes the collector
# itself) to debug only — Mimir wiring is a separate task.
