# OpenTelemetry Collector pipeline for whisperops.
#
# Receives OTLP from chat-frontend (Node), sandbox (FastAPI), budget-controller,
# and platform components. Fans out:
#   traces  → Tempo (durable GCS-backed) + Langfuse self-hosted (OTLP/HTTP)
#   metrics → Mimir (prometheusremotewrite) + Prometheus scrapes for node/kube/platform
#   logs    → Loki (from SDK OTLP logs; Alloy DaemonSet handles k8s stdout separately)
#
# Per-agent attribution added via k8sattributes processor (whisperops.io/agent pod label).
mode: deployment
image:
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
          cors:
            allowed_origins:
              - "*"

    # Prometheus scrape receivers for platform components
    prometheus:
      config:
        scrape_configs:
          - job_name: node-exporter
            scrape_interval: 30s
            static_configs:
              - targets:
                  - prometheus-node-exporter.observability.svc:9100

          - job_name: kube-state-metrics
            scrape_interval: 30s
            static_configs:
              - targets:
                  - kube-state-metrics.observability.svc:8080

          - job_name: kagent
            scrape_interval: 30s
            static_configs:
              - targets:
                  - kagent.kagent-system.svc:8080

          - job_name: argocd
            scrape_interval: 60s
            static_configs:
              - targets:
                  - argocd-metrics.argocd.svc:8082
                  - argocd-server-metrics.argocd.svc:8083

          - job_name: crossplane
            scrape_interval: 60s
            static_configs:
              - targets:
                  - crossplane.crossplane-system.svc:8080

          - job_name: kyverno
            scrape_interval: 60s
            static_configs:
              - targets:
                  - kyverno-svc-metrics.kyverno.svc:8000

          - job_name: opentelemetry-collector
            scrape_interval: 30s
            static_configs:
              - targets:
                  - localhost:8888

  processors:
    batch:
      timeout: 5s
      send_batch_size: 512

    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
        labels:
          - tag_name: agent.id
            key: whisperops.io/agent
            from: pod
          - tag_name: agent_name
            key: whisperops.io/agent
            from: pod
          - tag_name: agent.role
            key: whisperops.io/role
            from: pod
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
        - sources:
            - from: connection

    resource:
      attributes:
        - action: upsert
          key: deployment.environment
          value: dev

    transform/truncate_attrs:
      trace_statements:
        - context: span
          statements:
            - truncate_all(attributes, 2048)

    # Promote trace_id/span_id and service label attributes for Loki ingestion
    attributes/loki:
      actions:
        - key: loki.attribute.labels
          value: trace_id,span_id,service.name,agent_name,namespace
          action: insert

    resource/loki:
      attributes:
        - key: loki.resource.labels
          value: service.name,agent_name,namespace
          action: insert

  exporters:
    debug:
      verbosity: basic

    otlp/tempo:
      endpoint: tempo-mono.observability.svc.cluster.local:4317
      tls:
        insecure: true

    # otlphttp/langfuse exporter REMOVED — Langfuse Cloud no longer used after
    # ADR-Obs-3 self-host migration. Re-add pointed at the in-cluster Langfuse
    # OTLP endpoint (http://langfuse-web.observability.svc:3000/api/public/otel)
    # once self-hosted Langfuse is verified healthy. Traces still flow to Tempo.

    prometheusremotewrite:
      endpoint: http://lgtm-distributed-mimir-nginx.observability.svc:80/api/v1/push
      tls:
        insecure: true

    # Loki accepts OTLP natively since v3.0; the legacy `loki` exporter type
    # was deprecated and removed in OTel Collector contrib v0.123+. Use
    # otlphttp pointed at Loki's /otlp ingest path instead.
    otlphttp/loki:
      endpoint: http://lgtm-distributed-loki-gateway.observability.svc:80/otlp
      tls:
        insecure: true

  service:
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888
    pipelines:
      traces:
        receivers: [otlp]
        processors: [k8sattributes, resource, transform/truncate_attrs, batch]
        exporters: [otlp/tempo, debug]

      metrics:
        receivers: [otlp, prometheus]
        processors: [k8sattributes, resource, batch]
        exporters: [prometheusremotewrite, debug]

      logs:
        receivers: [otlp]
        processors: [k8sattributes, resource, resource/loki, attributes/loki, batch]
        exporters: [otlphttp/loki, debug]

extraEnvs:
  - name: LANGFUSE_OTLP_ENDPOINT
    valueFrom:
      secretKeyRef:
        name: langfuse-credentials
        key: LANGFUSE_OTLP_ENDPOINT
        optional: true
  - name: LANGFUSE_BASIC_AUTH
    valueFrom:
      secretKeyRef:
        name: langfuse-credentials
        key: LANGFUSE_BASIC_AUTH
        optional: true

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["replicasets", "deployments"]
      verbs: ["get", "list", "watch"]

serviceAccount:
  create: true
