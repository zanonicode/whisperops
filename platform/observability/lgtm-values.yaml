# lgtm-distributed values overrides for whisperops.
# Enables Tempo OTLP ingest so the OTel Collector can ship traces to it.
# Disables anti-affinity / spread (single-node kind cluster).
tempo:
  # Single-node kind cluster cannot satisfy the chart default of 2-replica
  # write paths. Set everything to 1 and disable redundancy checks.
  replicationFactor: 1
  metricsGenerator:
    enabled: false
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  distributor:
    affinity: {}
    topologySpreadConstraints: []
  ingester:
    affinity: {}
    topologySpreadConstraints: []
  querier:
    affinity: {}
    topologySpreadConstraints: []
  queryFrontend:
    affinity: {}
    topologySpreadConstraints: []
  compactor:
    affinity: {}
    topologySpreadConstraints: []
