# lgtm-distributed values overrides for whisperops.
# Enables Tempo OTLP ingest, sets replication factor to 1 for single-node
# kind, and removes anti-affinity / topology-spread that prevent scheduling
# on a single-node cluster.
tempo:
  metricsGenerator:
    enabled: false
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  ingester:
    affinity: {}
    topologySpreadConstraints: []
    config:
      replication_factor: 1
  distributor:
    affinity: {}
    topologySpreadConstraints: []
  querier:
    affinity: {}
    topologySpreadConstraints: []
  queryFrontend:
    affinity: {}
    topologySpreadConstraints: []
  compactor:
    affinity: {}
    topologySpreadConstraints: []

# Enable the grafana sidecar to auto-load ConfigMaps labeled
# grafana_dashboard=1 (whisperops-dashboards ConfigMap from
# observability-extras chart).
grafana:
  # Install the Infinity datasource plugin so Grafana can query the Langfuse
  # public REST API (/api/public/traces, /api/public/scores, etc.) — DD-24
  # follow-up: traces dual-ship to Langfuse via OTel; Langfuse-specific
  # panels (cost rollups, scores) read via Infinity.
  plugins:
    - yesoreyeram-infinity-datasource
  # Pull Langfuse credentials into Grafana's env so the datasource
  # provisioning ConfigMap can ${LANGFUSE_PUBLIC_KEY} / ${LANGFUSE_SECRET_KEY}.
  envFromSecret: langfuse-credentials
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
