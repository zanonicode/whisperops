# lgtm-distributed values overrides for whisperops.
# Enables Tempo OTLP ingest, sets replication factor to 1 for single-node
# kind, and removes anti-affinity / topology-spread that prevent scheduling
# on a single-node cluster.
tempo:
  metricsGenerator:
    enabled: false
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  ingester:
    affinity: {}
    topologySpreadConstraints: []
    config:
      replication_factor: 1
  distributor:
    affinity: {}
    topologySpreadConstraints: []
  querier:
    affinity: {}
    topologySpreadConstraints: []
  queryFrontend:
    affinity: {}
    topologySpreadConstraints: []
  compactor:
    affinity: {}
    topologySpreadConstraints: []
