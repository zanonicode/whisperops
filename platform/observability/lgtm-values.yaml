# lgtm-distributed values overrides for whisperops.
# Enables Tempo OTLP ingest, sets replication factor to 1 for single-node
# kind, and removes anti-affinity / topology-spread that prevent scheduling
# on a single-node cluster.
# lgtm-distributed Tempo is disabled: the distributor enforces 'min 2 live
# ingester replicas' even with replication_factor=1, which can't be
# satisfied on a single-node kind cluster. The standalone `tempo-mono`
# (grafana/tempo single-binary chart) handles all OTLP traffic; this
# sub-chart sits idle and burns ~500 MiB. Re-enable for multi-node clusters
# where replicas can actually schedule.
tempo:
  enabled: false

mimir:
  structuredConfig:
    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /data/alertmanager
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/ruler
    ruler:
      rule_path: /data/ruler
      # ConfigMaps labeled mimir-ruler-rules=1 are mounted here by the ArgoCD
      # observability app (sync-wave 5). Mimir reloads on file change.
      rule_files:
        - /etc/mimir-rules/*.yaml

  alertmanager:
    enabled: true
    fallbackConfig: |
      global:
        resolve_timeout: 5m
      route:
        receiver: "null"
      receivers:
        - name: "null"

grafana:
  plugins:
    - yesoreyeram-infinity-datasource
  # GCM credentials for Stackdriver datasource (ADR-Obs-2); sidecar reads ConfigMap
  # labeled grafana_datasource=1 and substitutes ${GRAFANA_GCM_SA_EMAIL} etc.
  envFromSecret: grafana-gcm-credentials
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Mimir
          type: prometheus
          access: proxy
          uid: mimir
          url: http://lgtm-distributed-mimir-nginx.observability.svc:80/prometheus
          isDefault: true
          jsonData:
            timeInterval: 30s

        - name: Loki
          type: loki
          access: proxy
          uid: loki
          url: http://lgtm-distributed-loki-gateway.observability.svc:80

        - name: Tempo
          type: tempo
          access: proxy
          uid: tempo
          url: http://tempo-mono.observability.svc:3100
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: "-2m"
              spanEndTimeShift: "2m"
              filterByTraceID: true
              filterBySpanID: false
              tags:
                - { key: "agent_name" }
                - { key: "namespace" }
                - { key: "service" }
              customQuery: false
            serviceMap:
              datasourceUid: mimir
            nodeGraph:
              enabled: true
            spanBar:
              type: "Tag"
              tag: "agent_name"

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
