# The autogen Vertex client reads auth from GOOGLE_APPLICATION_CREDENTIALS env
# at process startup. ModelConfig.apiKeySecretRef alone is insufficient — the
# env var is load-bearing.
#
# Provider key is GeminiVertexAI (kagent v1alpha1 CRD enum; ADR-10).
# Volume + volumeMount injection for the Vertex SA-key Secret is handled by
# kagent-postrender.sh (Path B, ADR-9 v1.1) — chart 0.4.3 does not expose
# app.volumes / app.volumeMounts at the values layer.
#
# Schema verified against kagent helm chart oci://ghcr.io/kagent-dev/kagent/helm/kagent:0.4.3
#   templates/deployment.yaml appends .Values.app.env verbatim after chart defaults.
providers:
  default: geminiVertexAI
  geminiVertexAI:
    provider: GeminiVertexAI
    model: "gemini-2.5-flash"
    apiKeySecretRef: kagent-vertex-credentials
    apiKeySecretKey: credentials.json
    geminiVertexAI:
      projectID: whisperops
      location: us-central1

app:
  env:
    - name: GOOGLE_APPLICATION_CREDENTIALS
      value: /var/secrets/google/credentials.json
    - name: GOOGLE_GENAI_USE_VERTEXAI
      value: "true"
    - name: GOOGLE_CLOUD_PROJECT
      value: whisperops
    - name: GOOGLE_CLOUD_LOCATION
      value: us-central1
    - name: AUTOGEN_DISABLE_RUNTIME_TRACING
      value: "false"
    - name: OTEL_SERVICE_NAME
      value: "kagent-app"
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "service.namespace=kagent-system,deployment.environment=dev"

otel:
  tracing:
    enabled: true
    exporter:
      otlp:
        endpoint: http://opentelemetry-collector.observability.svc.cluster.local:4317
        timeout: 15
        insecure: true

argo-rollouts-agent:
  enabled: false
cilium-debug-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-policy-agent:
  enabled: false
helm-agent:
  enabled: false
istio-agent:
  enabled: false
k8s-agent:
  enabled: false
kgateway-agent:
  enabled: false
observability-agent:
  enabled: false
promql-agent:
  enabled: false
