# autogen_ext AnthropicChatCompletionClient instantiates anthropic.Anthropic()
# WITHOUT passing the api_key from the Secret-backed ModelConfig chain. The SDK
# resolves auth solely from the env var at process startup. Without
# ANTHROPIC_API_KEY on the `app` container, every Agent invoke fails with:
#   "Could not resolve authentication method. Expected either api_key or
#    auth_token to be set."
#
# Source of truth for the value is the `anthropic-api-key` Secret in
# kagent-system (key `api-key`). The same Secret is replicated into each
# agent-* namespace by Reflector and referenced by ModelConfig.apiKeySecretRef.
#
# Schema verified against kagent helm chart oci://ghcr.io/kagent-dev/kagent/helm/kagent:0.4.3
#   templates/deployment.yaml: container `app` declares `env:` with chart-default
#   vars, then `{{- with .Values.app.env }}{{- toYaml . | nindent 12 }}{{- end }}`
#   which appends additional env vars verbatim.
# Default provider is set to anthropic so the querydoc container only mounts
# kagent-anthropic (optional) rather than kagent-openai (non-optional by chart
# default). Without this, querydoc fails CreateContainerConfigError because the
# kagent-openai secret is absent. apiKeySecretRef points at the same secret
# bootstrap populates.
providers:
  default: anthropic
  anthropic:
    provider: Anthropic
    model: "claude-sonnet-4-5"
    apiKeySecretRef: anthropic-api-key
    apiKeySecretKey: api-key

app:
  env:
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: anthropic-api-key
          key: api-key
    # The chart hardcodes AUTOGEN_DISABLE_RUNTIME_TRACING=true, which kills
    # all LLM/agent spans. Re-declaring with "false" causes Kubernetes to use
    # the second occurrence (the appended one wins), turning runtime tracing
    # back on so spans actually flow to the OTel collector.
    - name: AUTOGEN_DISABLE_RUNTIME_TRACING
      value: "false"
    # Resource attribute so Tempo/Grafana can group spans by service.
    - name: OTEL_SERVICE_NAME
      value: "kagent-app"
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "service.namespace=kagent-system,deployment.environment=dev"

# Enable OTel tracing -> in-cluster otel-collector. Our collector exports
# to Tempo (http://lgtm-distributed-tempo-distributor:4318) and the
# k8sattributes processor enriches every span with the agent.id /
# agent.role labels lifted from the pod.
otel:
  tracing:
    enabled: true
    exporter:
      otlp:
        endpoint: http://opentelemetry-collector.observability.svc.cluster.local:4317
        timeout: 15
        insecure: true

# Disable all kagent built-in demo agents. We only use our scaffolded
# dataset-whisperer agents (planner / analyst / writer in agent-* namespaces).
# The built-in agents (k8s, helm, cilium, istio, etc.) ship preconfigured with
# default-model-config, but their reconciliation races against ModelConfig
# registration in kagent's internal SQLite DB — at least one agent
# (observed: observability-agent) ends up with a broken model FK link, which
# causes kagent's `GET /api/agents` LIST endpoint to bail with
# "Agent not found: failed to get model: record not found". The chat-frontend's
# createSession path internally hits LIST, so a broken built-in agent makes the
# entire chat UI return HTTP 500 ("HTTP 500:" with empty body). Disabling the
# built-in agents we don't use removes the race entirely.
argo-rollouts-agent:
  enabled: false
cilium-debug-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-policy-agent:
  enabled: false
helm-agent:
  enabled: false
istio-agent:
  enabled: false
k8s-agent:
  enabled: false
kgateway-agent:
  enabled: false
observability-agent:
  enabled: false
promql-agent:
  enabled: false
