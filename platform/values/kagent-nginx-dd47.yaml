# DD-47 (DESIGN v1.20): kagent v0.4.3 chart's `ui` container runs nginx with
# a baked-in nginx.conf whose /api/ location block inherits the nginx default
# proxy_read_timeout of 60s. Heavy agent queries (write Python → exec → chart →
# synthesise answer) accumulate >60s wall-time, causing the internal nginx to
# terminate the upstream connection with HTTP 504.
#
# The chart exposes no ui.nginx.* timeout keys (Path A unavailable) and no
# extraNginxConfig injection (Path B unavailable). This ConfigMap (Path C)
# overrides /etc/nginx/nginx.conf via a volume mount patched into the Deployment
# by kagent-postrender.sh. The mount is surgical: only nginx.conf is replaced;
# all other chart-managed files are untouched.
#
# Changes from baked-in config (verified from live cluster 2026-05-07):
#   /api/  location: added proxy_read_timeout 600s + proxy_send_timeout 600s
#   /api/ws/ location: was already 300s; bumped to 600s for consistency
#   / location: unchanged (proxies Next.js UI, not the invoke endpoint)
#
# Applied via: kubectl apply -f platform/values/kagent-nginx-dd47.yaml
# (separate from helmfile — same pattern as `make langfuse-secret`, DD-29)
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-nginx-dd47
  namespace: kagent-system
  labels:
    app.kubernetes.io/managed-by: whisperops
    whisperops.io/dd: "DD-47"
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        # Log to stdout for container visibility
        access_log /dev/stdout;
        error_log /dev/stderr;

        log_format main        '[$time_local] $remote_addr - $remote_user - $request $status $body_bytes_sent $http_referer $http_user_agent $http_x_forwarded_for';
        log_format upstreamlog '[$time_local] $remote_addr - $remote_user - $server_name $host to: $upstream_addr: $request $status upstream_response_time $upstream_response_time msec $msec request_time $request_time';

        upstream kagent_ui {
            server 127.0.0.1:8001;
        }

        upstream kagent_ws_backend {
            server 127.0.0.1:8081;
        }

        upstream kagent_backend {
            server 127.0.0.1:8083;
        }

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        server {
            listen 8080;
            server_name localhost;

            # Frontend routes
            location / {
                proxy_pass http://kagent_ui;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Origin $scheme://$host;
                proxy_cache_bypass $http_upgrade;
            }

            # Backend routes — DD-47: bumped proxy_read/send_timeout 60s -> 600s
            location /api/ {
                proxy_pass http://kagent_backend/api/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $server_name;
                proxy_cache_bypass $http_upgrade;
                proxy_read_timeout 600s;
                proxy_send_timeout 600s;
            }

            location /api/ws/ {
                proxy_pass http://kagent_ws_backend/api/ws/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $server_name;
                proxy_read_timeout 600s;
                proxy_send_timeout 600s;
                proxy_buffering off;
            }
        }
    }
