apiVersion: v1
kind: ServiceAccount
metadata:
  name: ar-token-rotator
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ar-token-rotator
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ar-pull-secret-source"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ar-token-rotator
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ar-token-rotator
subjects:
  - kind: ServiceAccount
    name: ar-token-rotator
    namespace: crossplane-system
