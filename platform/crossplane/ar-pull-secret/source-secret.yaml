apiVersion: v1
kind: Secret
metadata:
  name: ar-pull-secret
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    # Replicate to agent-* AND whisperops-system. budget-controller
    # (whisperops-system) and per-agent sandbox/chat-frontend pods (agent-*)
    # reference imagePullSecrets: [ar-pull-secret]; without these consumer
    # namespaces, they fall into ImagePullBackOff with 403 anonymous-pull.
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "agent-.*|whisperops-system"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "agent-.*|whisperops-system"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: e30K
