apiVersion: v1
kind: Secret
metadata:
  name: ar-pull-secret
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    # Replicate to agent-* AND whisperops-system + platform namespaces.
    # budget-controller (whisperops-system) and platform-bootstrap (platform)
    # both reference imagePullSecrets: [ar-pull-secret]; an agent-* only regex
    # leaves them in ImagePullBackOff with 403 anonymous-pull errors.
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "agent-.*|whisperops-system|platform"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "agent-.*|whisperops-system|platform"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: e30K
