apiVersion: batch/v1
kind: Job
metadata:
  name: ar-pull-secret-seed
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: ar-token-rotator
      restartPolicy: OnFailure
      volumes:
        - name: gcp-creds
          secret:
            secretName: gcp-bootstrap-sa-key
      containers:
        - name: token-rotate
          # cloud-sdk:slim does NOT include kubectl — only :latest does. This
          # Job needs both gcloud (to mint an AR access token) and kubectl
          # (to patch the source Secret). Larger image (~1GB) but only this
          # Job + the 30min rotator CronJob pull it.
          image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              gcloud auth activate-service-account \
                --key-file=/etc/gcp-creds/credentials.json
              TOKEN=$(gcloud auth print-access-token)
              REGISTRY="us-central1-docker.pkg.dev"
              AUTH=$(printf "oauth2accesstoken:%s" "$TOKEN" | base64 -w0)
              DOCKERCFG=$(printf \
                '{"auths":{"%s":{"username":"oauth2accesstoken","password":"%s","auth":"%s"}}}' \
                "$REGISTRY" "$TOKEN" "$AUTH" | base64 -w0)
              kubectl patch secret ar-pull-secret \
                -n crossplane-system \
                --type=merge \
                -p "{\"data\":{\".dockerconfigjson\":\"$DOCKERCFG\"}}"
              echo "ar-pull-secret seeded successfully"
          volumeMounts:
            - name: gcp-creds
              mountPath: /etc/gcp-creds
              readOnly: true
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/gcp-creds/credentials.json
