# Knowledge Base Index
# Machine-readable registry for KB domains
#
# ============================================================================
# DEPRECATION NOTICE (2026-04-23)
# ============================================================================
# The KB domains registered below (pydantic, gemini, langfuse, terraform,
# terragrunt, crewai, openrouter, gcp, ansible, ansible-roles) were authored
# for a PRIOR invoice-processing pipeline project and are LEGACY.
#
# The CURRENT project is "DevOps Wiki — Unified Search Platform" — a
# federated-search web app over Azure DevOps Wiki + MediaWiki + Discourse.
# See ../../README.md and ../CLAUDE.md.
#
# DO NOT reference these KBs when planning DevOps Wiki features.
# New KBs needed (not yet created):
#   - azure-devops-wiki, mediawiki-api, discourse-api, markdown-search,
#     microsoft-sso, aws-serverless-web, react-search-ui
# See ../CLAUDE.md "Knowledge Base Status" section for rationale.
# ============================================================================

version: "1.0"
last_updated: "2026-04-23"
status: legacy_invoice_pipeline
current_project: devops-wiki-ui

# File Size Limits (SINGLE SOURCE OF TRUTH)
# Raised from 150/200 → 250/250 on 2026-04-27: code-simplifier domain
# revealed that some genuinely complex topics (landmines, idempotent
# make-targets, conditional-helm-templates) need depth and don't split
# cleanly into atomic 150-line sub-files without losing the through-line.
# 250 is still tight enough to discourage rambling; raises the floor for
# the legitimately complex cases without inviting bloat across the board.
limits:
  quick_reference: 100
  concept: 250
  pattern: 250
  spec: null
  reference: null

# Templates
templates:
  - name: concept
    path: _templates/concept.md.template
  - name: pattern
    path: _templates/pattern.md.template
  - name: index
    path: _templates/index.md.template
  - name: quick-reference
    path: _templates/quick-reference.md.template
  - name: spec
    path: _templates/spec.yaml.template
  - name: test-case
    path: _templates/test-case.json.template
  - name: domain-manifest
    path: _templates/domain-manifest.yaml.template

